<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | Gold Key Realty</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="nav">
    <div class="nav__inner">
      <a class="brand" href="../index.html">
        <img src="../assets/logo.png" alt="Keepin It Realty" />
        <div class="brand__name">Gold Key Realty</div>
      </a>
      <nav class="nav__links" aria-label="Primary">
        <a data-nav href="../index.html">Home</a>
        <a data-nav href="buy.html">Buy</a>
        <a data-nav href="sell.html">Sell</a>
        <a data-nav href="rent.html">Rent</a>
        <a data-nav href="about.html">About</a>
        <a data-nav href="market-snapshot.html">Market Snapshot</a>
      </nav>
      <div class="nav__auth">
        <a data-nav href="register.html">Register</a>
        <span aria-hidden="true" style="opacity:.65">/</span>
        <a data-nav href="sign-in.html">Sign In</a>
      </div>
    </div>
  </header>

  <main class="section section--paper">
    <div class="section__inner">
      <h2>REGISTER</h2>
      <p style="font-family:var(--serif);font-style:italic;max-width:75ch;line-height:1.9">
        This page should connect to your IDX/MLS account system (or a simple mailing list capture).
      </p>
      <div class="card" style="padding:22px;max-width:520px">
        <form>
          <label style="display:block;margin-bottom:12px">
            <span style="display:block;margin-bottom:6px">Email</span>
            <input style="width:100%;padding:12px;border:1px solid #e6dfd1" type="email" placeholder="you@example.com" />
          </label>
          <label style="display:block;margin-bottom:12px">
            <span style="display:block;margin-bottom:6px">Password</span>
            <input style="width:100%;padding:12px;border:1px solid #e6dfd1" type="password" placeholder="••••••••" />
          </label>
          <button class="btn btn--tan" type="button">Create Account</button>
        </form>
      </div>
    </div>
  </main>

  <script src="../script.js"></script>
</body>
</html>
