<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Buy | Gold Key Realty</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="nav">
    <div class="nav__inner">
      <a class="brand" href="../index.html">
        <img src="../assets/logo.png" alt="Keepin It Realty" />
        <div class="brand__name">Gold Key Realty</div>
      </a>
      <nav class="nav__links" aria-label="Primary">
        <a data-nav href="../index.html">Home</a>
        <a data-nav href="buy.html">Buy</a>
        <a data-nav href="sell.html">Sell</a>
        <a data-nav href="rent.html">Rent</a>
        <a data-nav href="about.html">About</a>
        <a data-nav href="market-snapshot.html">Market Snapshot</a>
      </nav>
      <div class="nav__auth">
        <a data-nav href="register.html">Register</a>
        <span aria-hidden="true" style="opacity:.65">/</span>
        <a data-nav href="sign-in.html">Sign In</a>
      </div>
    </div>
  </header>

  <main class="section section--paper">
    <div class="section__inner">
      <h2>BUY</h2>
      <p style="font-family:var(--serif);font-style:italic;max-width:80ch;line-height:1.8">
        Browse listings via our MLS-powered search.
      </p>

      <div class="card" style="padding:0; overflow:hidden">
        <iframe
          src="/assets/idx-placeholder.html"
          id="chimeWidgetBuy"
          frameborder="0"
          style="width:100%;height:100%;min-height:900px"
          title="Property Search">
        </iframe>
      </div>

      <script>
        const chimeWidget = document.getElementById('chimeWidgetBuy');
        window.addEventListener('message', function (e) {
          try {
            let data = JSON.parse(e.data);
            if (data.from === 'chimeSite' && data.event === 'updateBodyRect') {
              chimeWidget.style.height = data.data.height + 'px'
            }
          } catch (error) {
            console.log(error)
          }
        })
      </script>
    </div>
  </main>

  <script src="../script.js"></script>
</body>
</html>
